<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainTube</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🧠 BrainTube</h1>
    </div>
    
    <!-- Loading -->
    <div id="loading" class="section">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
    
    <!-- Auth Section -->
    <div id="auth" class="section" style="display: none;">
      <h2>Sign in to BrainTube</h2>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button class="btn-primary" id="signin-btn">Sign In</button>
      <div class="divider">or</div>
      <button class="btn-google" id="google-signin-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
          <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
          <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
          <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
    
    <!-- Main Section -->
    <div id="main" class="section" style="display: none;">
      <!-- Search Bar -->
      <input 
        type="text" 
        id="search" 
        class="search-input" 
        placeholder="Search your library..."
      />
      
      <!-- Current Video -->
      <div id="current-video" class="card" style="display: none;">
        <div class="card-header">Current Video</div>
        <div class="video-info">
          <div class="video-title" id="video-title"></div>
          <div class="video-status" id="video-status"></div>
        </div>
        <div class="card-actions">
          <button class="btn-primary btn-sm" id="view-note-btn">View Note</button>
          <button class="btn-secondary btn-sm" id="ai-chat-btn">AI Chat</button>
        </div>
      </div>
      
      <!-- AI Conversation Capture (shown on claude.ai / chatgpt.com) -->
      <div id="ai-capture" style="display: none;">
        <div class="card" id="ai-capture-card">
          <div class="card-header" id="ai-platform-label">AI Conversation</div>
          <div id="ai-save-status" style="font-size:12px; margin: 6px 0; opacity: 0.8;"></div>
          <div class="card-actions">
            <button class="btn-primary btn-sm" id="save-conversation-btn">💾 Save Conversation</button>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="btn-action" id="save-video-btn" style="display: none;">
          💾 Save This Video
        </button>
        <button class="btn-action" id="open-library-btn">
          📚 Open Library
        </button>
      </div>
      
      <!-- User Info -->
      <div class="user-info">
        <span id="user-email"></span>
        <button class="btn-link" id="signout-btn">Sign Out</button>
      </div>
    </div>
  </div>
  
  <script src="scripts/popup.js" type="module"></script>
</body>
</html>
